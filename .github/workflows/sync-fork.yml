name: 自动同步上游 XLeRobot

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 8:00 自动同步
  workflow_dispatch:    # 允许手动点击同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 添加上游仓库
        run: git remote add upstream  https://github.com/Vector-Wangel/XLeRobot

      - name: 拉取并合并上游更新
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories

      - name: 推送到你的仓库
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
