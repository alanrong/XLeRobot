name: Sync Repository
on: [push, workflow_dispatch]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 警告
    steps:
      - name: Checkout 仓库（拉取完整历史）
        uses: actions/checkout@v6.0.2  # 升级到兼容 Node.js 24 的版本
        with:
          fetch-depth: 0
          token: ${{ github.token }}  # 确保权限

      - name: 配置 Git 身份
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 执行同步操作（示例）
        run: |
          # 示例：拉取上游仓库代码
          git remote add upstream https://github.com/Vector-Wangel/XLeRobot.git
          git fetch upstream
          git merge upstream/main --no-edit
          git push origin main  # 推送到当前仓库的 main 分支
        env:
          GITHUB_TOKEN: ${{ github.token }}  # 传递 token 用于 push 鉴权
